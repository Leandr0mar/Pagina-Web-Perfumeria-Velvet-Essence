spring.application.name=perfumeria

# Puerto dinámico de Render
server.port=${PORT:8080}

# Base de Datos Supabase (PostgreSQL) con SSL Obligatorio
spring.datasource.url=jdbc:postgresql://db.mshlpehrumsqvucpjgtf.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=@VelvetEssence123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate (Dialecto eliminado para autodetección)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format.sql=true

# Tiempos de espera optimizados para conexiones en la nube
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# Seguridad
