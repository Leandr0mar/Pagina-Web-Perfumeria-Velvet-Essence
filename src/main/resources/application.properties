spring.application.name=perfumeria

#Base de Datos Mysql
spring.datasource.url=jdbc:mysql://localhost:3306/velvet_essence
spring.datasource.username=root
spring.datasource.password=74418228
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 'update' sincroniza la estructura de la BD con las Entidades Java sin borrar datos existentes
spring.jpa.hibernate.ddl-auto=update

#Trazabilidad de consultas de la Base de Datos
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format.sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.security.jwt-secret=${JWT_SECRET:velvet-essence-development-secret-key-2026-strong}
app.security.seed-admin=${SEED_ADMIN:true}
app.security.admin-email=${ADMIN_EMAIL:admin@velvet.com}
app.security.admin-password=${ADMIN_PASSWORD:Admin123!}
