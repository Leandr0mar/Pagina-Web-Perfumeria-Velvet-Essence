<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Velvet Essence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

    <!-- Esto inyecta el menú y le dice que resalte la sección 'dashboard' -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>

    <main class="admin-content">
        <header class="admin-topbar mb-5">
            <div>
                <h1 class="titulo">Resumen General</h1>
                <p class="text-muted monserat small">Métricas principales de la tienda.</p>
            </div>
            <div class="user-profile">
                <i class="bi bi-person-circle fs-3 me-2 text-gold"></i>
                <span class="monserat fw-bold">Administrador</span>
            </div>
        </header>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-droplet-half"></i></div>
                    <div class="stat-info">
                        <p>Total Perfumes</p>
                        <h3 th:text="${totalPerfumes}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-people"></i></div>
                    <div class="stat-info">
                        <p>Usuarios Registrados</p>
                        <h3 th:text="${totalUsuarios}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-bag-check"></i></div>
                    <div class="stat-info">
                        <p>Pedidos Realizados</p>
                        <h3 th:text="${totalPedidos}">0</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
