<!DOCTYPE html><html lang="es" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Dashboard | Velvet Essence</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><nav class="navbar navbar-dark bg-dark"><div class="container"><span class="navbar-brand">Velvet Essence | Admin</span><a href="/inicio" class="btn btn-outline-light">Ver tienda</a></div></nav><main class="container py-5"><h1>Dashboard</h1><p class="text-muted">Gestiona el catalogo, los usuarios y la revision de pedidos.</p><div class="row g-3 mb-4"><div class="col-md-4"><div class="stat"><span>Perfumes</span><strong th:text="${#lists.size(perfumes)}">0</strong></div></div><div class="col-md-4"><div class="stat"><span>Usuarios</span><strong th:text="${#lists.size(usuarios)}">0</strong></div></div><div class="col-md-4"><div class="stat"><span>Pedidos</span><strong th:text="${#lists.size(pedidos)}">0</strong></div></div></div><section class="card p-4 mb-4"><div class="d-flex justify-content-between"><h2>Perfumes</h2><button class="btn btn-dark" id="newPerfume">Nuevo perfume</button></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Nombre</th><th>Marca</th><th>Precio</th><th>Stock</th><th></th></tr></thead><tbody><tr th:each="p : ${perfumes}"><td th:text="${p.nombre}">Perfume</td><td th:text="${p.marca}">Marca</td><td th:text="${p.precio}">0</td><td th:text="${p.stock}">0</td><td><button class="btn btn-sm btn-outline-secondary edit-perfume" th:data-id="${p.id}">Editar</button> <button class="btn btn-sm btn-outline-danger delete-perfume" th:data-id="${p.id}">Eliminar</button></td></tr></tbody></table></div></section><section class="card p-4 mb-4"><h2>Usuarios</h2><div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Estado</th><th></th></tr></thead><tbody><tr th:each="u : ${usuarios}"><td th:text="${u.id}">1</td><td th:text="${u.nombre + ' ' + u.apellido}">Usuario</td><td th:text="${u.correo}">correo</td><td th:text="${u.estado ? 'Activo' : 'Inactivo'}">Activo</td><td><button class="btn btn-sm btn-outline-danger delete-user" th:data-id="${u.id}">Eliminar</button></td></tr></tbody></table></div></section><section class="card p-4"><h2>Revision de pedidos</h2><div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>Fecha</th><th>Total pagado</th><th></th></tr></thead><tbody><tr th:each="p : ${pedidos}"><td th:text="${p.id}">1</td><td th:text="${p.fechaPedido}">Fecha</td><td th:text="${p.totalPagado}">0</td><td><button class="btn btn-sm btn-outline-danger delete-order" th:data-id="${p.id}">Eliminar</button></td></tr></tbody></table></div></section></main><script th:src="@{/js/admin.js}"></script></body></html>
