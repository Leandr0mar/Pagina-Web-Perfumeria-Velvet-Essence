<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedidos | Velvet Essence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

    <div th:replace="~{fragments/admin-sidebar :: sidebar('pedidos')}"></div>

    <main class="admin-content">
        <header class="admin-topbar mb-5">
            <div>
                <h1 class="titulo">Revisión de Pedidos</h1>
                <p class="text-muted monserat small">Historial de todas las compras realizadas.</p>
            </div>
        </header>

        <section class="admin-section mb-5">
            <div class="custom-card">
                <div class="table-responsive">
                    <table class="table custom-table align-middle">
                        <thead>
                            <tr>
                                <th>ID Pedido</th>
                                <th>Fecha</th>
                                <th>Total Pagado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${pedidos}">
                                <td class="fw-bold" th:text="'ORD-' + ${p.id}">1</td>
                                 <td th:text="${#temporals.format(p.fechaPedido, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                                <td th:text="'S/ ' + ${p.totalPagado}">0.00</td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-action view-order" th:data-id="${p.id}" title="Ver Detalles"><i class="bi bi-eye"></i></button>
                                    <button class="btn btn-sm btn-action delete-order" th:data-id="${p.id}" title="Eliminar"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                             <tr th:if="${#lists.isEmpty(pedidos)}">
<!-- ... existing code ... -->
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- MODAL: Ver Detalles del Pedido -->
    <div class="modal fade" id="pedidoModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-0 border-0">
                <div class="modal-header bg-dark text-white rounded-0 border-0">
                    <h5 class="modal-title titulo">Detalles del Pedido <span id="modalOrderId" class="text-gold"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 monserat">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-2 mb-3">Información del Cliente</h6>
                            <p class="mb-1 small"><i class="bi bi-person me-2"></i><span id="modalOrderUser"></span></p>
                            <p class="mb-1 small"><i class="bi bi-envelope me-2"></i><span id="modalOrderEmail"></span></p>
                            <p class="mb-1 small"><i class="bi bi-telephone me-2"></i><span id="modalOrderPhone"></span></p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-2 mb-3">Dirección de Envío</h6>
                            <p class="mb-1 small"><i class="bi bi-geo-alt me-2"></i><strong id="modalOrderDistrito"></strong></p>
                            <p class="mb-1 small text-muted ms-4" id="modalOrderDireccion"></p>
                            <p class="mb-1 small text-muted ms-4" id="modalOrderCiudad"></p>
                        </div>
                    </div>
                    
                    <h6 class="fw-bold border-bottom pb-2 mb-3">Artículos del Pedido</h6>
                    <div class="table-responsive">
                        <table class="table custom-table table-sm">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Cant.</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="modalOrderItems">
                                <!-- Contenido inyectado por JS -->
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2" class="text-end fw-bold">Total Pagado:</td>
                                    <td class="fw-bold text-gold" id="modalOrderTotal">S/ 0.00</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light p-3">
                    <button type="button" class="btn btn-auth btn-auth-login" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
