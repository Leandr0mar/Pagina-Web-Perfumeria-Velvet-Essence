<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios | Velvet Essence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

    <div th:replace="~{fragments/admin-sidebar :: sidebar('usuarios')}"></div>

    <main class="admin-content">
        <header class="admin-topbar mb-5">
            <div>
                <h1 class="titulo">Gestión de Usuarios</h1>
                <p class="text-muted monserat small">Administra los clientes registrados en la plataforma.</p>
            </div>
        </header>

        <section class="admin-section mb-5">
            <div class="custom-card">
                <div class="table-responsive">
                    <table class="table custom-table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Correo</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td th:text="'#' + ${u.id}">1</td>
                                <td class="fw-bold" th:text="${u.nombre + ' ' + u.apellido}">Usuario</td>
                                <td th:text="${u.correo}">correo@ejemplo.com</td>
                                <td>
                                     <span th:class="${u.estado ? 'badge bg-success-subtle text-success' : 'badge bg-secondary-subtle text-secondary'}" 
                                          th:text="${u.estado ? 'Activo' : 'Inactivo'}">Activo</span>
                                </td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-action edit-user" th:data-id="${u.id}" title="Editar"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-action delete-user" th:data-id="${u.id}" title="Eliminar"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- MODAL: Editar Usuario -->
    <div class="modal fade" id="usuarioModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-0 border-0">
                <div class="modal-header bg-dark text-white rounded-0 border-0">
                    <h5 class="modal-title titulo">Editar Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="usuarioForm">
                    <div class="modal-body p-4 monserat">
                        <input type="hidden" id="userId">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Nombre</label>
                                <input type="text" class="form-control form-control-custom" id="userNombre" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Apellido</label>
                                <input type="text" class="form-control form-control-custom" id="userApellido" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control form-control-custom" id="userCorreo" required>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Teléfono</label>
                                <input type="text" class="form-control form-control-custom" id="userTelefono" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Estado</label>
                                <select class="form-select form-control-custom" id="userEstado">
                                    <option value="true">Activo</option>
                                    <option value="false">Inactivo</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 bg-light p-4">
                        <button type="button" class="btn btn-auth btn-auth-login" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-auth btn-auth-register">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
