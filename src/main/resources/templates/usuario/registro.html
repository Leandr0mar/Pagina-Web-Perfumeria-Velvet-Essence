<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fragancias Elite</title>

    <!-- Bootstrap 5 CSS + Icons + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="/css/Registro.css">
</head>

<body>

    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <!-- Tarjeta de registro -->
                <div class="register-card">

                    <div class="text-center mb-4">
                        <span class="brand-tag">Bienvenido</span>
                        <h1 class="register-title">Crear cuenta</h1>
                        <p class="register-subtitle">Regístrate para disfrutar de nuestras fragancias exclusivas</p>
                    </div>

                    <!-- Formulario de registro -->
                    <form id="registerForm">
                        <!-- Nombre -->
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="nombre" placeholder="Leandro Omar" required>
                            </div>
                        </div>

                        <!-- Apellido -->
                       <div class="mb-3">
                            <label for="apellido" class="form-label">Apellido</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="apellido" placeholder="Candia Falcon" required>
                            </div>
                        </div>

                        <!-- Correo electrónico -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" placeholder="juan@ejemplo.com" required>
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-phone"></i></span>
                                <input type="tel" class="form-control" id="phone" placeholder="999 999 999" required>
                            </div>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                                <button class="btn-toggle-password" type="button">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Confirmar contraseña -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Términos y condiciones -->
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label" for="terms">
                                Acepto los <a href="#" class="terms-link">términos y condiciones</a>
                            </label>
                        </div>

                        <div class="Alerta">
                            
                        </div>

                        <!-- Botón de registro -->
                        <button type="submit" class="btn-register w-100">
                            <i class="bi bi-person-plus"></i> Registrarse
                        </button>

                        <!-- Botón Volver al inicio -->
                        <div class="text-center mt-4">
                            <a href="/iniciarSesion" class="back-to-home">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript Personalizado -->
    <script src="/js/Registro.js"></script>
</body>
</html>
