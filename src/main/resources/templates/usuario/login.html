<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fragancias Elite</title>

    <!-- Bootstrap 5 CSS + Icons + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <!-- Tarjeta de login -->
                <div class="login-card">

                    <div class="text-center mb-4">
                        <span class="brand-tag">Bienvenido de vuelta</span>
                        <h1 class="login-title">Iniciar sesión</h1>
                        <p class="login-subtitle">Ingresa a tu cuenta para disfrutar de nuestras fragancias</p>
                    </div>

                    <!-- Formulario de login -->
                    <form id="loginForm">
                        <!-- Correo electrónico -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="correo" name="correo" placeholder="juan@ejemplo.com" required>
                            </div>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="contrasenia" name="contrasenia" placeholder="••••••••" required>
                                <button class="btn-toggle-password" type="button">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Recordar contraseña y link -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Recordarme</label>
                            </div>
                            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                        </div>

                        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

                        <!-- Botón de login -->
                        <button type="submit" class="btn-login w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
                        </button>
                        <!-- Mensaje de error / éxito -->
                        <div id="loginAlert" class="mt-3"></div>
                        <!-- Botón Volver al inicio -->
                        <div class="text-center mt-4">
                            <a href="/inicio" class="back-to-home">
                                <i class="bi bi-arrow-left"></i> Volver al inicio
                            </a>
                        </div>

                    </form>

                    <!-- Separador -->
                    <div class="separator mt-4">
                        <span>¿No tienes cuenta?</span>
                    </div>

                    <!-- Botón de registro -->
                    <div class="text-center mt-3">
                        <a href="/registrarse" class="btn-register-link">
                            <i class="bi bi-person-plus"></i> Crear cuenta nueva
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript Personalizado -->
    <script src="/js/login.js"></script>
</body>

</html>
